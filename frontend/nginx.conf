# ---------------------------------------------------------------------------
# nginx configuration for Money Agents frontend (production)
#
# Serves the Vite-built SPA with:
#   • Strict Content-Security-Policy
#   • Standard security headers (X-Frame-Options, HSTS, etc.)
#   • SPA fallback (all routes → index.html)
#   • Gzip compression
#   • Cache-control for hashed assets
# ---------------------------------------------------------------------------

server {
    listen       80;
    server_name  _;

    # SGA3-L7: Hide nginx version from response headers
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Security headers ----
    # SA3-M6: CSP connect-src uses localhost:* because the backend API port
    # is user-configurable (BACKEND_PORT env var, default 8000).  In a
    # production deployment with a fixed origin, template this to the
    # actual backend URL and remove the localhost wildcards.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob: http://localhost:* https://api.coingecko.com; "
        "font-src 'self' data:; "
        "connect-src 'self' ws://localhost:* wss://localhost:* https://api.coingecko.com; "
        "media-src 'self' blob: http://localhost:*; "
        "object-src 'none'; "
        "frame-ancestors 'none'; "
        "base-uri 'self'; "
        "form-action 'self';"
        always;

    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # HSTS — only enable once you have a valid TLS termination in front
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---- Gzip ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # ---- Hashed assets — immutable long cache ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-declare security headers (nginx drops parent add_header in child blocks)
        # SGA3-L8: Include CSP to prevent header loss in child location blocks
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: blob: http://localhost:* https://api.coingecko.com; "
            "font-src 'self' data:; "
            "connect-src 'self' ws://localhost:* wss://localhost:* https://api.coingecko.com; "
            "media-src 'self' blob: http://localhost:*; "
            "object-src 'none'; "
            "frame-ancestors 'none'; "
            "base-uri 'self'; "
            "form-action 'self';"
            always;
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "DENY"          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Block dot-files ----
    location ~ /\. {
        deny all;
        return 404;
    }
}
