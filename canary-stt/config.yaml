# Canary-STT Configuration
# NVIDIA Canary-Qwen-2.5B Speech-to-Text

server:
  host: "0.0.0.0"
  port: 8005

model:
  # HuggingFace model ID
  repo_id: "nvidia/canary-qwen-2.5b"
  # Maximum audio duration in seconds (training max was 40s)
  max_audio_duration: 40
  # Maximum new tokens for generation
  max_new_tokens: 1024
  # Device (auto-detected if not set)
  # device: "cuda"

memory:
  # Seconds of idle time before unloading model from GPU
  # Set to 0 to never unload
  idle_timeout: 300
  # PyTorch dtype: bfloat16 or float16
  dtype: "bfloat16"
